{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Project Imara</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .error-card {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .error-code {
            font-size: 5rem;
            font-weight: 700;
            color: #fdcb6e;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .error-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 0.75rem;
        }
        .error-text {
            color: #636e72;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: #6B4C9A;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #4A3570;
            color: white;
        }
        .logo {
            height: 48px;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <img src="{% static 'images/logo.png' %}" alt="Imara" class="logo">
        <div class="error-code">403</div>
        <h1 class="error-title">Access Denied</h1>
        <p class="error-text">You don't have permission to access this page. If you believe this is an error, please contact support.</p>
        <a href="/" class="btn">
            <i class="bi bi-house"></i> Go Home
        </a>
    </div>
</body>
</html>
