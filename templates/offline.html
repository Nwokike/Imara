{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Project Imara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .offline-card {
            background: white;
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .offline-icon {
            font-size: 4rem;
            color: #6B4C9A;
            margin-bottom: 1rem;
        }
        .offline-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 0.5rem;
        }
        .offline-text {
            color: #636e72;
            margin-bottom: 1.5rem;
        }
        .btn-primary {
            background-color: #6B4C9A;
            border-color: #6B4C9A;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background-color: #4A3570;
            border-color: #4A3570;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <i class="bi bi-wifi-off offline-icon"></i>
        <h1 class="offline-title">You're Offline</h1>
        <p class="offline-text">It looks like you've lost your internet connection. Please check your connection and try again.</p>
        <button onclick="window.location.reload()" class="btn btn-primary">
            <i class="bi bi-arrow-clockwise me-2"></i>Try Again
        </button>
    </div>
</body>
</html>
