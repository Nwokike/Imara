<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - Project Imara</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/error.css" rel="stylesheet">
</head>
<body>
    <div class="error-card">
        <img src="/static/images/logo.png" alt="Imara" class="error-logo">
        <div class="error-code error-code-red">500</div>
        <h1 class="error-title">Something Went Wrong</h1>
        <p class="error-text">We're experiencing technical difficulties. Our team has been notified and is working on a fix.</p>
        <a href="/" class="btn-error">
            <i class="bi bi-house"></i> Go Home
        </a>
    </div>
</body>
</html>
